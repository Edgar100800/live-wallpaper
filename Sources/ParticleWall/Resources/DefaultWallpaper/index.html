<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
  canvas { display: block; }
  * { user-select: none; -webkit-user-select: none; }
</style>
</head>
<body>
<script src="assets/three.min.js"></script>
<script>
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100);
  camera.position.z = 7;

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(0x000000, 1);
  document.body.appendChild(renderer.domElement);

  const COUNT = 6000;
  const positions = new Float32Array(COUNT * 3);
  const basePositions = new Float32Array(COUNT * 3);
  const phases = new Float32Array(COUNT);

  // Points on a fibonacci sphere for an even swarm shell.
  for (let i = 0; i < COUNT; i++) {
    const t = i / COUNT;
    const inclination = Math.acos(1 - 2 * t);
    const azimuth = Math.PI * (1 + Math.sqrt(5)) * i;
    const r = 2.6 + Math.random() * 0.5;
    const x = r * Math.sin(inclination) * Math.cos(azimuth);
    const y = r * Math.sin(inclination) * Math.sin(azimuth);
    const z = r * Math.cos(inclination);
    basePositions.set([x, y, z], i * 3);
    positions.set([x, y, z], i * 3);
    phases[i] = Math.random() * Math.PI * 2;
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  const material = new THREE.PointsMaterial({
    color: 0x00ff88,
    size: 0.025,
    transparent: true,
    opacity: 0.85,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });

  const points = new THREE.Points(geometry, material);
  scene.add(points);

  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  function loop(t) {
    requestAnimationFrame(loop);
    if (window.__pwPaused) return;
    const time = t * 0.001;
    const pos = geometry.attributes.position.array;
    for (let i = 0; i < COUNT; i++) {
      const j = i * 3;
      const breathe = 1 + 0.07 * Math.sin(time * 0.8 + phases[i]);
      pos[j]     = basePositions[j] * breathe;
      pos[j + 1] = basePositions[j + 1] * breathe;
      pos[j + 2] = basePositions[j + 2] * breathe;
    }
    geometry.attributes.position.needsUpdate = true;
    points.rotation.y = time * 0.08;
    points.rotation.x = Math.sin(time * 0.05) * 0.25;
    renderer.render(scene, camera);
  }
  requestAnimationFrame(loop);
</script>
</body>
</html>
