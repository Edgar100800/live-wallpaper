<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
  canvas { display: block; }
  * { user-select: none; -webkit-user-select: none; }
</style>
</head>
<body>
<script src="assets/three.min.js"></script>
<script>
  // ParticleWall boilerplate: full-screen scene/camera/renderer, resize handling
  // and a default particle system. The imported snippet runs after this setup
  // and can use (or replace) any of these globals:
  //   scene, camera, renderer, geometry, material, particles,
  //   positions (Float32Array), COUNT
  // Optionally define `function pwUpdate(t) { ... }` for per-frame logic.

  var scene = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
  camera.position.z = 6;

  var renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(0x000000, 1);
  document.body.appendChild(renderer.domElement);

  var COUNT = 5000;
  var positions = new Float32Array(COUNT * 3);
  for (var i = 0; i < COUNT * 3; i++) {
    positions[i] = (Math.random() - 0.5) * 8;
  }

  var geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  var material = new THREE.PointsMaterial({
    color: 0x00ff88,
    size: 0.03,
    transparent: true,
    opacity: 0.9,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });

  var particles = new THREE.Points(geometry, material);
  scene.add(particles);

  addEventListener('resize', function () {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // === USER SNIPPET (formation / animation logic) ===
  /*__PW_SNIPPET__*/
  // === END USER SNIPPET ===

  function pwLoop(t) {
    requestAnimationFrame(pwLoop);
    if (window.__pwPaused) return;
    if (typeof pwUpdate === 'function') {
      pwUpdate(t);
    } else {
      particles.rotation.y = t * 0.00008;
    }
    renderer.render(scene, camera);
  }
  requestAnimationFrame(pwLoop);
</script>
</body>
</html>
